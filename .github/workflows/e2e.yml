name: E2E

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30

    steps:
      - name: Checkout ord-frontend
        uses: actions/checkout@v4

      - name: Resolve pinned ord-api image
        id: ord-api
        run: |
          SHA=$(tr -d '[:space:]' < .github/ord-api-e2e-image.sha)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/kacper-ksiazek/ord-api:sha-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout ord-api
        uses: actions/checkout@v4
        with:
          repository: Kacper-Ksiazek/ord-api
          ref: ${{ steps.ord-api.outputs.sha }}
          path: ord-api

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start E2E backend stack
        env:
          ORD_API_IMAGE: ${{ steps.ord-api.outputs.image }}
        run: docker compose -f ord-api/docker-compose.e2e.yml up -d --wait

      - name: Create .env.e2e
        run: |
          cat > .env.e2e <<'EOF'
          E2E_BASE_URL=http://localhost:5173
          E2E_API_URL=http://localhost:8080
          E2E_TEST_EMAIL=e2e-ci@ord.test
          E2E_OTP_CODE=123456
          EOF

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run test:e2e:install

      - name: Run E2E tests
        run: CI=true bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down E2E backend stack
        if: always()
        env:
          ORD_API_IMAGE: ${{ steps.ord-api.outputs.image }}
        run: docker compose -f ord-api/docker-compose.e2e.yml down -v
